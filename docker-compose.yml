version: '3.9'

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - RESERVOIR_API_KEY=${RESERVOIR_API_KEY:-demo}
      - MODEL_WEIGHTS_PATH=/app/model/weights.pt
    volumes:
      - ./model_weights:/app/model:ro
    restart: unless-stopped

  # Dev-only: hot-reload frontend
  frontend-dev:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    profiles: ["dev"]
